{% extends "layout.html" %}

{% block content %}

<h2>Panel Dirección</h2>

<h3>Crear Grupo</h3>

<form action="/crear_grupo" method="POST">

<input name="nombre" placeholder="Nombre grupo">

<button>Crear</button>

</form>

<hr>

<h3>Crear Alumno</h3>

<form action="/crear_alumno" method="POST">

<input name="nombre" placeholder="Nombre">
<input name="correo" placeholder="Correo">
<input name="grupo" placeholder="Grupo">

<button>Crear</button>

</form>

<hr>

<h3>Crear Maestro</h3>

<form action="/crear_maestro" method="POST">

<input name="nombre" placeholder="Nombre">
<input name="correo" placeholder="Correo">
<input name="password" placeholder="Password">

<button>Crear</button>

</form>

<hr>

<h3>Alumnos</h3>

<ul>

{% for alumno in alumnos %}

<li>{{ alumno.nombre }} - {{ alumno.grupo }}</li>

{% endfor %}

</ul>

{% endblock %}
