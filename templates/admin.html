{% extends "layout.html" %}

{% block contenido %}

<div class="card">

<h2>Crear grupo</h2>

<form method="POST" action="/crear_grupo">

<input name="nombre" placeholder="Nombre grupo">

<button>Crear</button>

</form>

</div>


<div class="card">

<h2>Crear maestro</h2>

<form method="POST" action="/crear_maestro">

<input name="usuario" placeholder="Usuario maestro">

<input name="password" placeholder="Contraseña">

<button>Crear maestro</button>

</form>

</div>


<div class="card">

<h2>Registrar alumno</h2>

<form method="POST" action="/crear_alumno">

<input name="nombre" placeholder="Nombre">

<input name="apellido" placeholder="Apellido">

<input name="correo" placeholder="Correo">

<input name="grupo" placeholder="Grupo">

<button>Registrar</button>

</form>

</div>


<div class="card">

<h2>Alumnos registrados</h2>

<table>

<tr>
<th>Nombre</th>
<th>Apellido</th>
<th>Grupo</th>
</tr>

{% for a in alumnos %}

<tr>

<td>{{a.nombre}}</td>
<td>{{a.apellido}}</td>
<td>{{a.grupo}}</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
