<!DOCTYPE html>
<html>

<head>

<title>Panel Dirección</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f6fa;
}

.sidebar{
width:220px;
background:#2f3640;
height:100vh;
position:fixed;
color:white;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:10px 0;
}

.content{
margin-left:240px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input{
padding:8px;
margin-right:10px;
}

button{
padding:8px 15px;
background:#0984e3;
color:white;
border:none;
border-radius:4px;
}

table{
width:100%;
border-collapse:collapse;
}

table th, table td{
border-bottom:1px solid #ddd;
padding:8px;
text-align:left;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Control Escolar</h2>

<a href="/admin">Dashboard</a>
<a href="/logout">Cerrar sesión</a>

</div>

<div class="content">

<div class="card">

<h3>Crear Grupo</h3>

<form action="/crear_grupo" method="POST">

<input name="grupo" placeholder="Nombre del grupo">

<button type="submit">Crear</button>

</form>

</div>


<div class="card">

<h3>Registrar Alumno</h3>

<form action="/crear_alumno" method="POST">

<input name="nombre" placeholder="Nombre alumno">

<input name="grupo" placeholder="Grupo">

<button type="submit">Registrar</button>

</form>

</div>


<div class="card">

<h3>Alumnos Registrados</h3>

<table>

<tr>
<th>Nombre</th>
<th>Grupo</th>
</tr>

{% for alumno in alumnos %}

<tr>
<td>{{ alumno.nombre }}</td>
<td>{{ alumno.grupo }}</td>
</tr>

{% endfor %}

</table>

</div>


<div class="card">

<h3>Grupos</h3>

<ul>

{% for grupo in grupos %}

<li>{{ grupo.nombre }}</li>

{% endfor %}

</ul>

</div>

</div>

</body>
</html>
