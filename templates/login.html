<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Sistema Control Escolar</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f2740,#1e3a5f);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:10px;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    text-align:center;
}

.login-box h1{
    margin-bottom:25px;
    color:#1e3a5f;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    background:#1e3a5f;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0f2740;
}

.footer{
    margin-top:15px;
    font-size:12px;
    color:#777;
}

</style>

</head>

<body>

<div class="login-box">

<h1>Control Escolar</h1>

<form action="/login" method="POST">

<input 
type="text" 
name="usuario" 
placeholder="Usuario" 
required
>

<input 
type="password" 
name="password" 
placeholder="Contraseña" 
required
>

<button type="submit">
Entrar
</button>

</form>

<div class="footer">

Sistema Escolar

</div>

</div>

</body>
</html>
