{% extends "layout.html" %}

{% block content %}

<div class="card" style="max-width:800px;margin:auto;">

    <h2 style="margin-bottom:25px;">
        Editar Movimiento Financiero
    </h2>

    <form method="POST">

        <label>Monto</label>

        <input
            type="number"
            step="0.01"
            name="monto"
            value="{{ movimiento.monto }}"
            required
        >

        <br><br>

        <label>Método de pago</label>

        <select name="metodo">

            <option
                value="efectivo"
                {% if movimiento.metodo=="efectivo" %}
                selected
                {% endif %}
            >
                Efectivo
            </option>

            <option
                value="transferencia"
                {% if movimiento.metodo=="transferencia" %}
                selected
                {% endif %}
            >
                Transferencia
            </option>

            <option
                value="tarjeta"
                {% if movimiento.metodo=="tarjeta" %}
                selected
                {% endif %}
            >
                Tarjeta
            </option>

        </select>

        <br><br>

        <label>Mes cubierto</label>

        <input
            type="text"
            name="mes_cubierto"
            value="{{ movimiento.mes_cubierto }}"
            required
        >

        <br><br>

        <button
            type="submit"
            class="btn btn-success"
        >
            Guardar cambios
        </button>

        <a
            href="/admin/expediente_pago/{{ movimiento.pago_id }}"
            class="btn btn-secondary"
        >
            Cancelar
        </a>

    </form>

</div>

{% endblock %}
