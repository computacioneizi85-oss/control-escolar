{% extends "layout.html" %}

{% block content %}

<h2>Respaldos del Sistema</h2>

<div class="card">

    <h3>Respaldos Manuales</h3>

    <p>
        Descarga respaldos independientes del sistema.
    </p>

    <a
        href="/admin/backup/financiero"
        class="btn btn-primary">

        Descargar Respaldo Financiero

    </a>

    <br><br>

    <a
        href="/admin/backup/control_escolar"
        class="btn btn-primary">

        Descargar Respaldo Escolar

    </a>

    <br><br>

    <a
        href="/admin/backup/descargar"
        class="btn btn-primary">

        Descargar Respaldo Completo

    </a>

</div>

<hr>

<div class="card">

    <h3>Programación Automática</h3>

<form method="POST" action="/admin/backup/guardar_configuracion">

    <label>
        Tipo de respaldo
    </label>

    <select name="tipo">

        <option value="financiero">
            Financiero
        </option>

        <option value="control_escolar">
            Control Escolar
        </option>

        <option value="sistema">
            Sistema Completo
        </option>

    </select>

    <br><br>

    <label>
        Frecuencia
    </label>

    <select name="unidad">

        <option value="horas">
            Horas
        </option>

        <option value="dias">
            Días
        </option>

    </select>

    <br><br>

    <label>
        Intervalo
    </label>

    <input
        type="number"
        name="intervalo"
        value="24"
        min="1"
    >

    <br><br>

    <button type="submit">

        Guardar Configuración

    </button>

</form>

</div>

{% endblock %}
