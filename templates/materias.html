{% extends "layout.html" %}

{% block contenido %}

<div class="card">

<h2>Registrar Materia</h2>

<form method="POST" action="/crear_materia">

<input name="nombre" placeholder="Nombre de la materia">

<button class="btn-green">Registrar</button>

</form>

</div>


<div class="card">

<h2>Lista de Materias</h2>

<table>

<tr>
<th>Materia</th>
</tr>

{% for m in materias %}

<tr>

<td>{{m.nombre}}</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
