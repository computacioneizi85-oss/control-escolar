{% extends "layout.html" %}

{% block content %}

<h1>Gestión de materias</h1>


<h2>Registrar materia</h2>

<form action="/crear_materia" method="POST">

<input type="text" name="nombre" placeholder="Nombre de la materia" required>

<select name="grupo">

{% for grupo in grupos %}

<option value="{{ grupo.nombre }}">
{{ grupo.nombre }}
</option>

{% endfor %}

</select>

<button type="submit">
Registrar materia
</button>

</form>


<br>
<br>


<h2>Lista de materias</h2>

<table>

<tr>
<th>Materia</th>
<th>Grupo</th>
<th>Eliminar</th>
</tr>

{% for materia in materias %}

<tr>

<td>{{ materia.nombre }}</td>

<td>{{ materia.grupo }}</td>

<td>

<a href="/eliminar_materia/{{ materia._id }}">
<button style="background:red;">Eliminar</button>
</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
