{% extends "layout.html" %}

{% block content %}

<h2>Editar Control de Pago</h2>

<form method="POST">

<label>Mensualidad</label>

<input
    type="number"
    step="0.01"
    name="mensualidad"
    value="{{ pago.mensualidad }}"
    required
>

<br><br>

<label>Meses Totales</label>

<input
    type="number"
    name="meses_totales"
    value="{{ pago.meses_totales }}"
    required
>

<br><br>

<button type="submit">
Guardar cambios
</button>

</form>

{% endblock %}
