{% extends "layout.html" %}

{% block content %}

<h2>Editar Control de Pago</h2>

<form method="POST">

<label>Mensualidad</label>

<input
    type="number"
    step="0.01"
    name="mensualidad"
    value="{{ pago.mensualidad }}"
    required
>

<br><br>

<label>Meses Totales</label>

<br><br>

<label>Tipo de cobro</label>

<select name="tipo_cobro">

    <option
        value="global"
        {% if pago.tipo_cobro == "global" %}
        selected
        {% endif %}
    >
        Global
    </option>

    <option
        value="mensual"
        {% if pago.tipo_cobro == "mensual" %}
        selected
        {% endif %}
    >
        Mensual
    </option>

</select>

<br><br>

<input
    type="number"
    name="meses_totales"
    value="{{ pago.meses_totales }}"
    required
>

<br><br>

<label>Beca (%)</label>

<input
    type="number"
    name="beca"
    value="{{ pago.get('beca',0) }}"
>

<br><br>

<label>Descuento ($)</label>

<input
    type="number"
    step="0.01"
    name="descuento"
    value="{{ pago.get('descuento',0) }}"
>

<br><br>

<label>Observaciones</label>

<textarea
    name="observaciones"
    rows="5"
    style="width:100%;"
>{{ pago.get('observaciones','') }}</textarea>

<br><br>

<button type="submit">
Guardar cambios
</button>

</form>

{% endblock %}
