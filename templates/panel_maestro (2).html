<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel del Maestro</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#1e3c72;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#2a5298;
color:white;
}

a{
text-decoration:none;
color:white;
background:#1e3c72;
padding:6px 12px;
border-radius:4px;
font-size:13px;
}

.logout{
float:right;
background:#c0392b;
}

</style>

</head>

<body>

<header>

<h2>Panel del Maestro</h2>

<a class="logout" href="/logout">Cerrar sesión</a>

</header>

<div class="container">

<h3>Lista de alumnos</h3>

<table>

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Kardex</th>
<th>Reporte</th>
</tr>

{% for alumno in alumnos %}

<tr>

<td>{{ alumno.id }}</td>

<td>{{ alumno.nombre }}</td>

<td>
<a href="/kardex/{{ alumno.id }}">Ver Kardex</a>
</td>

<td>
<a href="/reporte_pdf/{{ alumno.id }}">PDF</a>
</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
