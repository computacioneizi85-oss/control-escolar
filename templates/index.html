
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Control Escolar Pro</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:400px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h1{
margin-bottom:10px;
color:#1e3c72;
}

h2{
margin-top:30px;
color:#444;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#1e3c72;
color:white;
border:none;
border-radius:5px;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#16305c;
}

.separador{
margin:20px 0;
border-top:1px solid #eee;
}

</style>

</head>
<body>

<div class="container">

<h1>📚 Control Escolar Pro</h1>
<p>Acceso al sistema</p>

<div class="separador"></div>

<h2>Administrador</h2>

<form action="/login_admin" method="post">

<input type="text" name="usuario" placeholder="Usuario administrador" required>

<input type="password" name="password" placeholder="Contraseña" required>

<button type="submit">Entrar como Administrador</button>

</form>

<div class="separador"></div>

<h2>Maestro</h2>

<form action="/login_maestro" method="post">

<input type="text" name="usuario" placeholder="Usuario maestro" required>

<input type="password" name="password" placeholder="Contraseña" required>

<button type="submit">Entrar como Maestro</button>

</form>

</div>

</body>
</html>
