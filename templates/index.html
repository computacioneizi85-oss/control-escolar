<!DOCTYPE html>
<html>

<head>

<title>Control Escolar</title>

<style>

body{
font-family:Arial;
background:#1b263b;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login{
background:white;
padding:40px;
border-radius:8px;
width:300px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
background:#0d1b2a;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="login">

<h2>Control Escolar</h2>

<form method="POST" action="/login">

<input name="usuario" placeholder="Usuario">
<input name="password" type="password" placeholder="Contraseña">

<button>Entrar</button>

</form>

</div>

</body>
</html>
