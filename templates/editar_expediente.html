{% extends "layout.html" %}

{% block content %}

<div class="card" style="max-width:1000px;margin:auto;">

<h1 style="margin-bottom:30px;">
✏️ Editar expediente
</h1>

<a href="/admin/expediente/{{ alumno._id }}">

<button
type="button"
style="
background:#3498db;
color:white;
border:none;
padding:10px 18px;
border-radius:10px;
margin-bottom:25px;
cursor:pointer;
"
>

⬅️ Volver al expediente

</button>

</a>

<form
method="POST"
action="/admin/guardar_expediente/{{ alumno._id }}"
enctype="multipart/form-data"
>

<div style="
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
">

<!-- DATOS -->
<div class="card">

<h2>📌 Datos del alumno</h2>

<input name="nombre" value="{{ alumno.nombre }}" placeholder="Nombre">

<input name="curp" value="{{ alumno.curp }}" placeholder="CURP">

<select name="sexo">

<option value="Masculino"
{% if alumno.sexo == "Masculino" %}selected{% endif %}
>
Masculino
</option>

<option value="Femenino"
{% if alumno.sexo == "Femenino" %}selected{% endif %}
>
Femenino
</option>

</select>

<input
type="date"
name="fecha_nacimiento"
value="{{ alumno.fecha_nacimiento }}"
>

<input name="telefono" value="{{ alumno.telefono }}" placeholder="Teléfono">

<input name="direccion" value="{{ alumno.direccion }}" placeholder="Dirección">

<input
name="escuela_procedencia"
value="{{ alumno.escuela_procedencia }}"
placeholder="Escuela"
>

<input name="promedio" value="{{ alumno.promedio }}" placeholder="Promedio">

<input name="afecciones" value="{{ alumno.afecciones }}" placeholder="Afecciones">

</div>

<!-- PADRE -->
<div class="card">

<h2>👨‍👩‍👧 Padre o tutor</h2>

<input
name="padre_nombre"
value="{{ alumno.padre_nombre }}"
placeholder="Nombre padre"
>

<input
name="padre_telefono"
value="{{ alumno.padre_telefono }}"
placeholder="Teléfono padre"
>

<input
name="padre_correo"
value="{{ alumno.padre_correo }}"
placeholder="Correo padre"
>

<hr style="margin:20px 0;">

<h2>🏫 Escolar</h2>

<input name="grupo" value="{{ alumno.grupo }}" placeholder="Grupo">

<input name="usuario" value="{{ alumno.usuario }}" placeholder="Usuario">

<input name="password" value="{{ alumno.password }}" placeholder="Password">

<hr style="margin:20px 0;">

<h2>📷 Foto</h2>

{% if alumno.foto %}

{% if "static/" in alumno.foto %}

<img
src="/{{ alumno.foto }}"
width="180"
style="
border-radius:15px;
margin-bottom:15px;
object-fit:cover;
"
>

{% else %}

<img
src="data:image/png;base64,{{ alumno.foto }}"
width="180"
style="
border-radius:15px;
margin-bottom:15px;
object-fit:cover;
"
>

{% endif %}

{% endif %}

<input type="file" name="foto">

</div>

</div>

<div style="
margin-top:30px;
text-align:center;
">

<button style="
background:#27ae60;
color:white;
border:none;
padding:15px 25px;
border-radius:10px;
font-size:16px;
cursor:pointer;
">

💾 Guardar cambios

<a href="/admin/expediente/{{ alumno._id }}">

<button
type="button"
style="
background:#7f8c8d;
color:white;
border:none;
padding:15px 25px;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin-left:15px;
"
>

Cancelar

</button>

</a>

</button>

</div>

</form>

</div>

{% endblock %}
