<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Escolar</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
background:#eef1f5;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#0d1b2a;
color:white;
padding:20px;
}

.sidebar h2{
font-size:18px;
margin-bottom:20px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px;
border-radius:5px;
margin-bottom:5px;
}

.sidebar a:hover{
background:#1b263b;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
background:#0d1b2a;
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logout{
background:#e63946;
color:white;
padding:8px 12px;
text-decoration:none;
border-radius:5px;
}

/* CONTENT */

.content{
padding:25px;
overflow:auto;
}

/* CARDS */

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:25px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#e5e7eb;
text-align:left;
}

/* BUTTONS */

button{
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.btn-green{
background:#2ecc71;
color:white;
}

.btn-red{
background:#e74c3c;
color:white;
}

input{
padding:8px;
border:1px solid #ccc;
border-radius:5px;
margin-right:5px;
}

</style>
</head>


<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Panel Dirección<br>Control Escolar</h2>

<p><b>MENÚ</b></p>

<a href="/admin">Inicio</a>
<a href="/configuracion">Configuración Institucional</a>
<a href="/asistencias">Asistencias</a>
<a href="/reportes">Reportes Disciplinarios</a>

</div>


<div class="main">

<div class="header">

<h3>Panel Dirección</h3>

<a class="logout" href="/logout">Cerrar sesión</a>

</div>


<div class="content">

{% block contenido %}
{% endblock %}

</div>

</div>

</body>
</html>
