<!DOCTYPE html>
<html>

<head>

<title>Control Escolar</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
background:#eef2f7;
}

.sidebar{

width:220px;
background:#0d1b2a;
color:white;
height:100vh;
padding:20px;

}

.sidebar a{

display:block;
color:white;
text-decoration:none;
padding:10px;
margin-bottom:5px;

}

.sidebar a:hover{

background:#1b263b;

}

.main{

flex:1;

}

.header{

background:#0d1b2a;
color:white;
padding:15px;

}

.content{

padding:30px;

}

.card{

background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;

}

table{

width:100%;
border-collapse:collapse;

}

th,td{

padding:10px;
border-bottom:1px solid #ddd;

}

button{

padding:8px;
background:#2ecc71;
border:none;
color:white;
border-radius:5px;

}

input{

padding:8px;
margin-bottom:8px;
width:100%;

}

</style>

</head>


<body>

<div class="sidebar">

<h2>Control Escolar</h2>

<a href="/admin">Dashboard</a>

<a href="/logout">Cerrar sesión</a>

</div>


<div class="main">

<div class="header">

Sistema de Control Escolar

</div>

<div class="content">

{% block contenido %}

{% endblock %}

</div>

</div>

</body>
</html>
