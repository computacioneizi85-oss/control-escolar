{% extends "layout.html" %}
{% block contenido %}

<div class="card">

<h2>Reportes de Alumnos</h2>

<table>

<tr>
<th>Alumno</th>
<th>Grupo</th>
<th>Kardex</th>
</tr>

{% for alumno in alumnos %}

<tr>

<td>{{ alumno.nombre }} {{ alumno.apellido }}</td>

<td>{{ alumno.grupo }}</td>

<td>
<a href="/kardex/{{ alumno.id }}">
<button>Ver Kardex</button>
</a>
</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
