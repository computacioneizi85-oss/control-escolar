{% extends "layout.html" %}

{% block contenido %}

<div class="card">

<h2>Reportes disciplinarios</h2>

<table>

<tr>
<th>Maestro</th>
<th>Alumno</th>
<th>Descripción</th>
<th>Estado</th>
<th>Acción</th>
</tr>

{% for r in reportes %}

<tr>

<td>{{r.maestro}}</td>
<td>{{r.alumno}}</td>
<td>{{r.descripcion}}</td>
<td>{{r.estado}}</td>

<td>

{% if r.estado == 'pendiente' %}

<a href="/aprobar_reporte/{{r.id}}">
<button>Aprobar</button>
</a>

{% endif %}

<a href="/reporte_pdf/{{r.id}}">
<button>PDF</button>
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
