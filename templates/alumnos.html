{% extends "layout.html" %}

{% block contenido %}

<div class="card">

<h2>Registrar Alumno</h2>

<form method="POST" action="/crear_alumno">

<input name="nombre" placeholder="Nombre" required>
<input name="apellido" placeholder="Apellido" required>
<input name="correo" placeholder="Correo">
<input name="grado" placeholder="Grado">

<select name="grupo">
{% for g in grupos %}
<option value="{{g.nombre}}">{{g.nombre}}</option>
{% endfor %}
</select>

<button class="btn-green">Registrar</button>

</form>

</div>


<div class="card">

<h2>Importar alumnos desde Excel</h2>

<form method="POST" action="/importar_alumnos" enctype="multipart/form-data">

<input type="file" name="archivo">

<button class="btn-green">Importar</button>

</form>

</div>


<div class="card">

<h2>Lista de Alumnos</h2>

<table>

<tr>
<th>Nombre</th>
<th>Apellido</th>
<th>Grupo</th>
<th>Kardex</th>
<th>Boleta</th>
</tr>

{% for alumno in alumnos %}

<tr>

<td>{{alumno.nombre}}</td>
<td>{{alumno.apellido}}</td>
<td>{{alumno.grupo}}</td>

<td>
<a href="/kardex/{{alumno.id}}">
<button>Ver</button>
</a>
</td>

<td>
<a href="/boleta_pdf/{{alumno.id}}">
<button>PDF</button>
</a>
</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
