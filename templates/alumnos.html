{% extends "layout.html" %}

{% block titulo %}
Gestión de Alumnos
{% endblock %}

{% block contenido %}

<h2>Registrar alumno</h2>

<form action="/crear_alumno" method="POST">

<input type="text" name="nombre" placeholder="Nombre del alumno" required>

<select name="grupo">

{% for grupo in grupos %}

<option value="{{ grupo.nombre }}">{{ grupo.nombre }}</option>

{% endfor %}

</select>

<button type="submit">Registrar</button>

</form>


<br><br>

<h2>Lista de alumnos</h2>

<table>

<tr>

<th>Nombre</th>
<th>Grupo</th>
<th>Acciones</th>

</tr>

{% for alumno in alumnos %}

<tr>

<td>{{ alumno.nombre }}</td>

<td>{{ alumno.grupo }}</td>

<td>

<a href="/editar_alumno/{{ alumno._id }}">
<button>Editar</button>
</a>

<a href="/eliminar_alumno/{{ alumno._id }}">
<button>Eliminar</button>
</a>

<a href="/kardex/{{ alumno.nombre }}">
<button>Kardex</button>
</a>

<a href="/boleta/{{ alumno.nombre }}">
<button>Boleta</button>
</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
