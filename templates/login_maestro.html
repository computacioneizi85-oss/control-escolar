<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login Maestro - Control Escolar</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #0d1b2a, #1b263b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:40px;
    width:350px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.login-box h2{
    text-align:center;
    margin-bottom:25px;
    color:#0d1b2a;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    background:#2ecc71;
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#27ae60;
}

.error{
    background:#e74c3c;
    color:white;
    padding:8px;
    border-radius:6px;
    margin-bottom:15px;
    text-align:center;
    font-size:14px;
}

.back-link{
    text-align:center;
    margin-top:15px;
}

.back-link a{
    text-decoration:none;
    color:#3498db;
    font-size:14px;
}
</style>
</head>

<body>

<div class="login-box">

    <h2>Acceso Maestro</h2>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">

        <input type="email"
               name="correo"
               placeholder="Correo electrónico"
               required>

        <input type="password"
               name="password"
               placeholder="Contraseña"
               required>

        <button type="submit">Iniciar Sesión</button>

    </form>

    <div class="back-link">
        <a href="/">Volver al login dirección</a>
    </div>

</div>

</body>
</html>
