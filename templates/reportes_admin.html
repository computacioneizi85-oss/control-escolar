{% extends "layout.html" %}

{% block content %}

<h2>Reportes Disciplinarios</h2>

<a href="/admin">
<button>Volver</button>
</a>

<br><br>

<table>

<tr>
<th>Alumno</th>
<th>Maestro</th>
<th>Comentario</th>
<th>Estado</th>
<th>Acción</th>
</tr>

{% for r in reportes %}

<tr>

<td>{{ r.alumno }}</td>

<td>{{ r.maestro }}</td>

<td>{{ r.comentario }}</td>

<td>{{ r.estatus }}</td>

<td>

{% if r.estatus == "pendiente" %}

<!-- ✅ RUTA CORRECTA -->
<a href="/admin/aprobar_reporte/{{ r._id }}">
<button>Autorizar</button>
</a>

{% else %}

<!-- ⚠️ ESTE YA NO FUNCIONA PORQUE YA NO GUARDAS PDF EN DB -->
<!-- LO CAMBIAMOS PARA GENERARLO EN TIEMPO REAL -->

<a href="/admin/aprobar_reporte/{{ r._id }}">
<button>Ver PDF</button>
</a>

{% endif %}

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
