<!DOCTYPE html>
<html>
<head>
<title>Reportes Disciplinarios</title>
</head>
<body>

<h2>Reportes Disciplinarios</h2>
<a href="/admin">Volver</a>

<table border="1">
<tr>
<th>Alumno</th>
<th>Grupo</th>
<th>Motivo</th>
<th>Estado</th>
<th>Acción</th>
</tr>

{% for r in reportes %}
<tr>
<td>{{ r.nombre_alumno }}</td>
<td>{{ r.grupo }}</td>
<td>{{ r.motivo }}</td>
<td>{{ r.estado }}</td>
<td>
{% if r.estado == "Pendiente" %}
<a href="/autorizar_reporte/{{ r._id }}">
<button>Autorizar</button>
</a>
{% else %}
<a href="/static/reporte_{{ r._id }}.pdf" target="_blank">
<button>Descargar PDF</button>
</a>
{% endif %}
</td>
</tr>
{% endfor %}

</table>

</body>
</html>
