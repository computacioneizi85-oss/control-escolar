{% extends "layout.html" %}

{% block content %}

<h1>Gestión de grupos</h1>

<h2>Crear grupo</h2>

<form action="/admin/crear_grupo" method="POST">

<input type="text" name="nombre" placeholder="Nombre del grupo" required>

<button type="submit">Crear grupo</button>

</form>

<br><br>

<h2>Lista de grupos</h2>

<table>

<tr>
<th>Grupo</th>
<th>Eliminar</th>
</tr>

{% for grupo in grupos %}
<tr>
<td>{{ grupo.nombre }}</td>
<td>
<a href="/admin/eliminar_grupo/{{ grupo._id }}">
<button style="background:red;">Eliminar</button>
</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
