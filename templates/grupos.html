{% extends "layout.html" %}

{% block contenido %}

<div class="card">

<h2>Crear grupo</h2>

<form method="POST" action="/crear_grupo">

<input name="nombre" placeholder="Nombre del grupo">

<button class="btn-green">Crear</button>

</form>

</div>


<div class="card">

<h2>Lista de grupos</h2>

<table>

<tr>
<th>Grupo</th>
</tr>

{% for g in grupos %}

<tr>
<td>{{g.nombre}}</td>
</tr>

{% endfor %}

</table>

</div>

{% endblock %}
