{% extends "layout.html" %}

{% block content %}

<h1>Panel del Maestro</h1>

<h3>Bienvenido {{ session["usuario"] }}</h3>

<br>

<div class="card">

<h2>Capturar calificaciones</h2>

<form action="/capturar_calificaciones" method="POST">

<label>Alumno</label>

<select name="alumno">

{% for alumno in alumnos %}

<option value="{{ alumno.nombre }}">
{{ alumno.nombre }}
</option>

{% endfor %}

</select>

<br><br>

<label>Materia</label>

<select name="materia">

{% for materia in materias %}

<option value="{{ materia.nombre }}">
{{ materia.nombre }}
</option>

{% endfor %}

</select>

<br><br>

<label>Primer parcial</label>
<input type="number" name="cal1" required>

<br><br>

<label>Segundo parcial</label>
<input type="number" name="cal2" required>

<br><br>

<label>Tercer parcial</label>
<input type="number" name="cal3" required>

<br><br>

<button type="submit">
Guardar calificaciones
</button>

</form>

</div>

{% endblock %}
