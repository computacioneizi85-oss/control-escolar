{% extends "layout.html" %}

{% block content %}

<h2>Panel del Maestro</h2>

<table>

<tr>
<th>Alumno</th>
<th>Grupo</th>
<th>Calificaciones</th>
<th>Asistencia</th>
<th>Reporte</th>
</tr>

{% for alumno in alumnos %}

<tr>

<td>{{ alumno.nombre }}</td>
<td>{{ alumno.grupo }}</td>

<td>

<form action="/guardar_calificaciones" method="POST">

<input type="hidden" name="alumno" value="{{ alumno.nombre }}">

<input type="number" name="cal1" placeholder="C1" required>
<input type="number" name="cal2" placeholder="C2" required>
<input type="number" name="cal3" placeholder="C3" required>

<button type="submit">Guardar</button>

</form>

</td>


<td>

<form action="/registrar_asistencia" method="POST">

<input type="hidden" name="alumno" value="{{ alumno.nombre }}">

<select name="estado">

<option value="asistencia">Asistencia</option>
<option value="retardo">Retardo</option>
<option value="falta">Falta</option>

</select>

<button type="submit">Registrar</button>

</form>

</td>


<td>

<form action="/crear_reporte" method="POST">

<input type="hidden" name="alumno" value="{{ alumno.nombre }}">

<input type="text" name="comentario" placeholder="Comentario">

<button type="submit">Enviar</button>

</form>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
