{% extends "layout.html" %}

{% block content %}

<h2>Panel del Maestro</h2>

<table>

<tr>
<th>Alumno</th>
<th>Grupo</th>
<th>Calificaciones</th>
<th>Asistencia</th>
<th>Reporte</th>
</tr>

{% for alumno in alumnos %}

<tr>

<td>{{ alumno.nombre }}</td>
<td>{{ alumno.grupo }}</td>

<td>

<form method="POST" action="/guardar_calificaciones">

<input type="hidden" name="alumno" value="{{ alumno.nombre }}">

<input type="number" name="cal1" placeholder="C1">
<input type="number" name="cal2" placeholder="C2">
<input type="number" name="cal3" placeholder="C3">

<button type="submit">Guardar</button>

</form>

</td>

<td>

<form method="POST" action="/registrar_asistencia">

<input type="hidden" name="alumno" value="{{ alumno.nombre }}">

<select name="estado">

<option value="asistencia">Asistencia</option>
<option value="retardo">Retardo</option>
<option value="falta">Falta</option>

</select>

<button type="submit">Registrar</button>

</form>

</td>

<td>

<form method="POST" action="/crear_reporte">

<input type="hidden" name="alumno" value="{{ alumno.nombre }}">

<input type="text" name="comentario">

<button type="submit">Enviar</button>

</form>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
