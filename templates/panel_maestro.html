{% extends "layout.html" %}

{% block contenido %}

<div class="card">

<h2>Crear reporte disciplinario</h2>

<form method="POST" action="/crear_reporte">

<input name="maestro" placeholder="Nombre del maestro">

<input name="alumno" placeholder="Alumno">

<textarea name="descripcion" placeholder="Descripción del incidente"></textarea>

<button class="btn-green">Enviar reporte</button>

</form>

</div>


<div class="card">

<h2>Reportes enviados</h2>

<table>

<tr>
<th>Alumno</th>
<th>Descripción</th>
<th>Estado</th>
</tr>

{% for r in reportes %}

<tr>

<td>{{r.alumno}}</td>
<td>{{r.descripcion}}</td>
<td>{{r.estado}}</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
