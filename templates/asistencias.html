{% extends "layout.html" %}
{% block contenido %}

<h2>Registro de asistencias</h2>

<div class="contenedor-alumnos">

{% for alumno in alumnos %}

<div class="card-alumno">

<div class="foto">

{% if alumno.foto %}
<img src="/{{ alumno.foto }}">
{% else %}
<img src="/static/img/user.png">
{% endif %}

</div>

<h3>{{ alumno.nombre }}</h3>

<p>Grupo {{ alumno.grupo }}</p>

<form method="POST" action="/guardar_asistencia">

<input type="hidden" name="alumno" value="{{ alumno._id }}">

<input type="hidden" name="fecha" value="{{ fecha }}">

<div class="botones">

<button name="estado" value="Asistencia" class="btn-asistencia">
✔ Asistencia
</button>

<button name="estado" value="Falta" class="btn-falta">
✖ Falta
</button>

<button name="estado" value="Retardo" class="btn-retardo">
⏰ Retardo
</button>

</div>

</form>

</div>

{% endfor %}

</div>


<style>

.contenedor-alumnos{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:20px;
margin-top:20px;
}

.card-alumno{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
text-align:center;
}

.card-alumno img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
}

.botones{
display:flex;
flex-direction:column;
gap:5px;
margin-top:10px;
}

.btn-asistencia{
background:#2ecc71;
color:white;
border:none;
padding:6px;
cursor:pointer;
border-radius:5px;
}

.btn-falta{
background:#e74c3c;
color:white;
border:none;
padding:6px;
cursor:pointer;
border-radius:5px;
}

.btn-retardo{
background:#f39c12;
color:white;
border:none;
padding:6px;
cursor:pointer;
border-radius:5px;
}

</style>

{% endblock %}
