{% extends "layout.html" %}

{% block content %}

<div class="container-fluid">

    <h2>

        Bitácora Financiera

    </h2>

<form method="GET">

    <div class="row mb-3">

        <div class="col-md-3">

            <label>

                Desde

            </label>

            <input
                type="date"
                name="fecha_inicio"
                class="form-control"
                value="{{ fecha_inicio or '' }}"
            >

        </div>

        <div class="col-md-3">

            <label>

                Hasta

            </label>

            <input
                type="date"
                name="fecha_fin"
                class="form-control"
                value="{{ fecha_fin or '' }}"
            >

        </div>

        <div class="col-md-3">

            <label>

                Usuario

            </label>

            <input
                type="text"
                name="usuario"
                class="form-control"
                value="{{ usuario or '' }}"
            >

        </div>

        <div class="col-md-3">

            <label>

                &nbsp;

            </label>

            <div>

                <button
                    type="submit"
                    class="btn btn-primary"
                >

                    Filtrar

                </button>

                <a
                    href="/admin/bitacora_pagos_pdf?fecha_inicio={{ fecha_inicio }}&fecha_fin={{ fecha_fin }}&usuario={{ usuario }}"
                    class="btn btn-danger"
                    target="_blank"
                >

                    PDF

                </a>

            </div>

        </div>

    </div>

</form>

    <div class="card">

        <div class="card-body">

            <table class="table table-striped">

                <thead>

                    <tr>

                        <th>Fecha</th>

                        <th>Usuario</th>

                        <th>Acción</th>

                        <th>Alumno</th>

                        <th>Folio</th>

                        <th>Monto</th>

                    </tr>

                </thead>

                <tbody>

                    {% for r in registros %}

                    <tr>

                        <td>

                            {{ r.fecha.strftime("%d/%m/%Y %H:%M") }}

                        </td>

                        <td>

                            {{ r.usuario }}

                        </td>

                        <td>

                            {{ r.accion }}

                        </td>

                        <td>

                            {{ r.alumno }}

                        </td>

                        <td>

                            {{ r.folio }}

                        </td>

                        <td>

                            ${{ r.monto }}

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
